function resizeCanvas() {
    const windowWidth = window.innerWidth;
    const windowHeight = window.innerHeight;
    const scale = Math.min(windowWidth / WINDOW_WIDTH, windowHeight / WINDOW_HEIGHT);
    
    canvas.style.width = (WINDOW_WIDTH * scale) + 'px';
    canvas.style.height = (WINDOW_HEIGHT * scale) + 'px';
}

/* ============================================================
   UNIVERSAL INPUT (Single handler for Mouse + Touch)
   ============================================================ */
function handleInput(e) {
    e.preventDefault();
    
    // Get the coordinates from either touch or mouse event
    let clientX, clientY;
    if (e.touches) {
        // Touch event
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        // Mouse event
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    
    // Calculate the actual game coordinates considering the scale
    const scale = rect.width / WINDOW_WIDTH;
    const gameX = x / scale;
    const gameY = y / scale;

        else if(dir==="right"){dir="up"}
    }
    // Right half

        if(dir==="up"){dir="right"}
        else if(dir==="right"){dir="down"}
        else if(dir==="down"){dir="left"}
        else if(dir==="left"){dir="up"}

}
